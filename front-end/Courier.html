 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Parcel Delivery | Marcus Logistics & Shuttle Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <link rel="stylesheet" href="booking.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <button class="menu-toggle" aria-label="open menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="userDashboard.html">Dashboard</a></li>
      <li><a href="booking.html">Book a Ride</a></li>
      <li><a href="Courier.html" class="active">Parcel Delivery</a></li>
      <li><a href="logout.html">Logout</a></li>
    </ul>
  </nav>

  <section class="courier-section">
    <div class="courier-container">

      <div class="courier-header">
        <h1>Parcel Delivery</h1>
        <p>Send parcels safely and reliably to your destination.</p>
      </div>

      <form class="courier-form">

        <!-- CLIENT INFO -->
        <h3 class="form-section-title">
          <i class="fas fa-id-card"></i> Sender Information
        </h3>

        <div class="form-group">
          <label>Who is sending the parcel?</label>
          
            <select id="courierClientMode">
                <option value="self">Myself (use saved profile)</option>
                <option value="other">Someone else</option>
            </select>

        </div>

        <!-- SAVED CLIENT -->
        <div id="courierSavedClient" class="client-preview">
            <p><strong>Name:</strong> John Doe</p>
            <p><strong>WhatsApp:</strong> +27 76 123 4567</p>
            <p><strong>Email:</strong> john@email.com</p>
        </div>

        <!-- MANUAL CLIENT -->
        <div id="courierManualClient" style="display:none;">

          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" placeholder="Enter first name" />
            </div>

            <div class="form-group">
              <label>Last Name</label>
              <input type="text" placeholder="Enter last name" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>WhatsApp Number</label>
              <input type="tel" placeholder="+27 76 123 4567" />
            </div>

            <div class="form-group">
              <label>Email (Optional)</label>
              <input type="email" placeholder="example@email.com" />
            </div>
          </div>
        </div>

        <!-- PARCEL DETAILS -->
        <h3 class="form-section-title">
          <i class="fas fa-box"></i> Parcel Details
        </h3>

        <div class="form-row">
          <div class="form-group">
            <label>Parcel Type</label>
            <select required>
              <option value="">Select parcel type</option>
              <option>Documents</option>
              <option>Small Box</option>
              <option>Medium Box</option>
              <option>Large Box</option>
              <option>Fragile Item</option>
            </select>
          </div>

          <div class="form-group">
            <label>Estimated Weight</label>
            <select required>
              <option value="">Select weight</option>
              <option>0 – 2 kg</option>
              <option>3 – 5 kg</option>
              <option>6 – 10 kg</option>
              <option>10+ kg</option>
            </select>
          </div>
        </div>

        <!-- DELIVERY DETAILS -->
        <h3 class="form-section-title">
          <i class="fas fa-map-marker-alt"></i> Delivery Details
        </h3>

        <div class="form-row">
          <div class="form-group">
            <label>Pickup Address</label>
            <input type="text" placeholder="Enter pickup location" required />
          </div>

          <div class="form-group">
            <label>Delivery Address</label>
            <input type="text" placeholder="Enter delivery destination" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Pickup Date</label>
            <input type="date" required />
          </div>
        </div>

        <!-- NOTES -->
        <h3 class="form-section-title">
          <i class="fas fa-info-circle"></i> Additional Instructions
        </h3>

        <div class="form-group">
          <textarea placeholder="Fragile, handle with care, call on arrival, etc."></textarea>
        </div>

        <!-- ACTIONS -->
        <div class="form-actions">
          <a href="userDashboard.html" class="btn secondary">Cancel</a>
          <button type="submit" class="btn primary">Submit Parcel Request</button>
        </div>

      </form>
    </div>
  </section>

  <!-- JS -->
  <script src="script.js"></script>
  <script src="courior.js"></script>


</body>
</html>
