 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Parcel Delivery | Marcus Logistics & Shuttle Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <link rel="stylesheet" href="booking.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <button class="menu-toggle" aria-label="open menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="userDashboard.html">Dashboard</a></li>
      <li><a href="booking.html">Book a Ride</a></li>
      <li><a href="Courier.html" class="active">Parcel Delivery</a></li>
    </ul>
  </nav>

  <section class="courier-section">
    <div class="courier-container">

      <div class="courier-header">
        <h1>Parcel Delivery</h1>
        <p>Send parcels safely and reliably to your destination.</p>
      </div>

      <form class="courier-form">

        <!-- CLIENT INFO -->
        <h3 class="form-section-title">
          <i class="fas fa-id-card"></i> Sender Information
        </h3>
        <!-- MANUAL CLIENT -->
        <div id="courierManualClient">

          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" name="firstName" placeholder="Enter first name" required />
            </div>

            <div class="form-group">
              <label>Last Name</label>
              <input type="text" name="lastName" placeholder="Enter last name" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>WhatsApp Number</label>
              <input type="tel" name="phone" placeholder="+27 76 123 4567" required />
            </div>

            <div class="form-group">
              <label>Email (Optional)</label>
              <input type="email" name="email" placeholder="example@email.com" />
            </div>
          </div>
        </div>

        <!-- PARCEL DETAILS -->
        <h3 class="form-section-title">
          <i class="fas fa-box"></i> Parcel Details
        </h3>

        <div class="form-row">
          <div class="form-group">
            <label>Parcel Type</label>
            <select required>
              <option value="">Select parcel type</option>
              <option>Documents</option>
              <option>Small Box</option>
              <option>Medium Box</option>
              <option>Large Box</option>
              <option>Fragile Item</option>
            </select>
          </div>

          <div class="form-group">
            <label>Estimated Weight</label>
            <select required>
              <option value="">Select weight</option>
              <option>0 – 2 kg</option>
              <option>3 – 5 kg</option>
              <option>6 – 10 kg</option>
              <option>10+ kg</option>
            </select>
          </div>
        </div>

        <!-- DELIVERY DETAILS -->
        <h3 class="form-section-title">
          <i class="fas fa-map-marker-alt"></i> Delivery Details
        </h3>

        <div class="form-row">
          <div class="form-group">
                        <label>Pickup Location *</label>
                        <input type="text" placeholder="Enter pickup address" required />
                        <input style="margin-top: 10px;" type="text" placeholder="Suburb (optional)" />
                        <input style="margin-top: 10px;" type="text" placeholder="City" required />
                    </div>
                    <div class="form-group">
                        <label>Destination *</label>
                        <input type="text" placeholder="Enter destination address" required />
                        <input style="margin-top: 10px;" type="text" placeholder="Suburb (optional) " />
                        <input style="margin-top: 10px;" type="text" placeholder="City" required />
                    </div>

        <div class="form-row">
          <div class="form-group">
            <label>Pickup Date</label>
            <input type="date" required />
          </div>
        </div>

        <!-- NOTES -->
        <h3 class="form-section-title">
          <i class="fas fa-info-circle"></i> Additional Instructions
        </h3>

        <div class="form-group">
          <textarea placeholder="Fragile, handle with care, call on arrival, etc."></textarea>
        </div>

        <!-- ACTIONS -->
        <div class="form-actions">
          <a href="userDashboard.html" class="btn secondary">Cancel</a>
          <button type="submit" class="btn primary">Submit Parcel Request</button>
        </div>

      </form>
    </div>
  </section>

  <!-- JS -->
  <script src="script.js"></script>
  <script src="courior.js"></script>


</body>
</html>
