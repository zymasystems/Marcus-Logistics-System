<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Request a Ride | Marcus Logistics & Shuttle Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <link rel="stylesheet" href="booking.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <!-- NAVBAR (CONSISTENT WITH DASHBOARD) -->
    <nav class="navbar">
        <button class="menu-toggle" aria-label="open menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="userDashboard.html">Dashboard</a></li>
            <li><a href="booking.html" class="active">Book a Ride</a></li>
            <li><a href="confirm.html">Parcel Delivery</a></li>
            <li><a href="Login.html">Logout</a></li>
        </ul>
    </nav>

    <!-- BOOKING PAGE -->
    <section class="booking-section">
        <div class="booking-container">
            
            <div class="booking-header">
                <h1>Request a Ride</h1>
                <p>Fill in the details below and we will arrange your transport.</p>
            </div>

            <form class="booking-form">

                <!-- CLIENT SELECT -->
                <h3 class="form-section-title"><i class="fas fa-id-card"></i> Client Information</h3>
                
                <div class="form-group">
                    <label>Who is this booking for?</label>

                    <select id="bookingClientMode">
                        <option value="self">Myself (use saved profile)</option>
                        <option value="other">Someone else</option>
                    </select>
                </div>

                <!-- AUTO-FILLED CLIENT INFO -->
                <div id="bookingSavedClient" class="client-preview">
                    <p><strong>Name:</strong> <span id="clientName">John Doe</span></p>
                    <p><strong>WhatsApp:</strong> <span id="clientPhone">+27 76 123 4567</span></p>
                    <p><strong>Email:</strong> <span id="clientEmail">john@email.com</span></p>
                </div>
 

                <!-- MANUAL CLIENT INFO -->
            <div id="bookingManualClient" style="display:none;">
                <!-- PERSONAL DETAILS -->
                <h3 class="form-section-title"><i class="fas fa-user"></i> Passenger Details</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="firstName" placeholder="Enter first name" required />
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="lastName" placeholder="Enter last name" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>WhatsApp Number</label>
                        <input type="tel" name="phone" placeholder="e.g. +27 76 123 4567" required />
                    </div>
                    <div class="form-group">
                        <label>Email (Optional)</label>
                        <input type="email" name="email" placeholder="example@email.com" />
                    </div>
                </div>
            </div>

                <!-- TRIP DETAILS -->
                <h3 class="form-section-title"><i class="fas fa-map-marker-alt"></i> Trip Details</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Pickup Location</label>
                        <input type="text" placeholder="Enter pickup address" required />
                    </div>
                    <div class="form-group">
                        <label>Destination</label>
                        <input type="text" placeholder="Enter destination address" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" required />
                    </div>
                   
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Luggage</label>
                        <select required>
                            <option value="">Select luggage amount</option>
                            <option>Small (1–2 bags)</option>
                            <option>Medium (3–4 bags)</option>
                            <option>Large (5+ bags)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Passengers</label>
                        <select required>
                            <option value="">Number of passengers</option>
                            <option>1</option><option>2</option><option>3</option>
                            <option>4</option><option>5+</option>
                        </select>
                    </div>
                </div>

                <!-- NOTES -->
                <h3 class="form-section-title"><i class="fas fa-info-circle"></i> Additional Information</h3>
                <div class="form-group">
                    <textarea rows="3" placeholder="Special instructions (child seat, airport pickup, etc.)"></textarea>
                </div>

                <!-- ACTIONS -->
                <div class="form-actions">
                    <a href="userDashboard.html" class="btn secondary">Cancel</a>
                    <button type="submit" class="btn primary">Submit Booking</button>
                </div>
            </form>
                    
        </div>
    </section>

    <script src="script.js"></script>
    <script src="booking.js"></script>
</body>
</html>
