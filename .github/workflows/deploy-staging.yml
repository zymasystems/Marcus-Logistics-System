name: Deploy to Staging

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Staging to VPS
        run: |
          rsync -avz --delete --exclude='.git' --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/marcus-staging/

          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd /var/www/marcus-staging || exit 1

            if [ -f package.json ]; then
              npm install
              if command -v pm2 >/dev/null 2>&1; then
                pm2 restart all || pm2 start ecosystem.config.js || true
              fi
            fi

            sudo systemctl restart nginx
          "
